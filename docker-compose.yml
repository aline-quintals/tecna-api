version: '3.9'

services:
  mysql:
    image: mysql:8
    container_name: mysql-tecna
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "20m@rido25"
      MYSQL_DATABASE: "tecna"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: tecna-api
    restart: always
    depends_on:
      - mysql
    ports:
      - "8000:8000"

volumes:
  mysql_data: